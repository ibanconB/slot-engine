services:
  dev:
    build:
      context: .
      target: dev
    image: slot-engine:dev
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./scripts:/app/scripts
      - ./games:/app/games
      - ./pyproject.toml:/app/pyproject.toml
    working_dir: /app
    tty: true
    stdin_open: true
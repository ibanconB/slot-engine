# "Lucky Sevens" config

[game]
name = "Lucky Sevens"
engine = "classic_lines"
window_size = 3

[symbols.cherry]
is_wild = false
is_scatter = false

[symbols.lemon]
is_wild = false
is_scatter = false

[symbols.bell]
is_wild = false
is_scatter = false

[symbols.bar]
is_wild = false
is_scatter = false

[symbols.seven]
is_wild = false
is_scatter = false

[[reels]]
strip = ["cherry", "lemon", "bell", "cherry", "lemon", "bar", "seven", "cherry", "lemon", "bell"]

[[reels]]
strip = ["lemon", "bell", "cherry", "lemon", "bar", "bell", "cherry", "lemon", "seven", "bell"]

[[reels]]
strip = ["bell", "cherry", "lemon", "bell", "seven", "cherry", "lemon", "bar", "bell", "cherry"]

[[reels]]
strip = ["cherry", "bell", "lemon", "cherry", "bar", "lemon", "bell", "seven", "cherry", "lemon"]

[[reels]]
strip = ["lemon", "cherry", "bell", "lemon", "seven", "bell", "cherry", "lemon", "bar", "bell"]

[paytable.cherry]
"3" = "2.00"
"4" = "9.00"
"5" = "40.00"

[paytable.lemon]
"3" = "3.00"
"4" = "18.00"
"5" = "90.00"

[paytable.bell]
"3" = "9.00"
"4" = "40.00"
"5" = "220.00"

[paytable.bar]
"3" = "19.00"
"4" = "90.00"
"5" = "400.00"

[paytable.seven]
"3" = "50.00"
"4" = "200.00"
"5" = "2500.00"

[[paylines]]
name = "top"
rows = [0, 0, 0, 0, 0]

[[paylines]]
name = "middle"
rows = [1, 1, 1, 1, 1]

[[paylines]]
name = "bottom"
rows = [2, 2, 2, 2, 2]
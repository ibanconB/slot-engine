[game]
name = "Lucky Bonus"
engine = "lucky_bonus"
window_size = 5

[symbols.coin]
is_wild = false
is_scatter = false

[symbols.gem]
is_wild = false
is_scatter = false

[symbols.crown]
is_wild = false
is_scatter = false

[symbols.chest]
is_wild = false
is_scatter = false

[symbols.BONUS]
is_wild = false
is_scatter = true

# Reel 0 — con BONUS
[[reels]]
strip = ["coin", "gem", "crown", "coin", "chest", "BONUS", "coin", "gem", "crown", "coin", "gem", "chest", "coin", "crown", "gem"]

# Reel 1 — sin BONUS
[[reels]]
strip = ["gem", "coin", "crown", "coin", "gem", "chest", "coin", "crown", "gem", "coin", "chest", "gem", "crown", "coin", "coin"]

# Reel 2 — con BONUS
[[reels]]
strip = ["crown", "coin", "gem", "BONUS", "chest", "coin", "gem", "crown", "coin", "chest", "gem", "coin", "crown", "coin", "gem"]

# Reel 3 — sin BONUS
[[reels]]
strip = ["coin", "crown", "gem", "coin", "chest", "gem", "coin", "crown", "coin", "gem", "chest", "coin", "gem", "crown", "coin"]

# Reel 4 — con BONUS
[[reels]]
strip = ["gem", "crown", "coin", "chest", "coin", "gem", "BONUS", "coin", "crown", "gem", "coin", "chest", "coin", "gem", "crown"]

